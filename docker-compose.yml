# Merkraum — Self-hosted knowledge memory for AI agents
# Usage: docker compose up -d
#
# After starting, configure your MCP client to connect to http://localhost:8090/mcp

services:
  merkraum:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: merkraum-server
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      MERKRAUM_BACKEND: neo4j_qdrant
      MERKRAUM_PROJECT: default
      MERKRAUM_PORT: "8090"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: merkraum-local
      QDRANT_URL: http://qdrant:6333
      # Optional: set OPENAI_API_KEY for LLM-powered text ingestion
      # OPENAI_API_KEY: sk-...
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: merkraum-neo4j
    ports:
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: neo4j/merkraum-local
      NEO4J_PLUGINS: '[]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - merkraum-neo4j-data:/data
      - merkraum-neo4j-logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: merkraum-qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - merkraum-qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  merkraum-neo4j-data:
  merkraum-neo4j-logs:
  merkraum-qdrant-data:
